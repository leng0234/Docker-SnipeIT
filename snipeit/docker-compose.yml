version: '3.8'
services:
  snipeit:
    image: snipe/snipe-it:latest
    ports:
      - "8000:80"
    environment:
      - APP_URL=http://192.168.89.10:8000
      - APP_TIMEZONE=Asia/Bangkok
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=snipe_it
      - DB_USERNAME=snipeit
      - DB_PASSWORD=secret
      - APP_KEY=base64:Uipy4yKmPTXpd312l0nOgjwrMs+iqwuTzfrNqnNb7yc=
      - CORS_ALLOWED_ORIGINS=*
      - PHP_UPLOAD_LIMIT=50M
      - PHP_MAX_FILE_UPLOAD=50M
      - PHP_POST_MAX_SIZE=50M
      - MEMORY_LIMIT=256M
    volumes:
      - snipeit_data:/var/lib/snipeit
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    command: --event-scheduler=ON
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=snipe_it
      - MYSQL_USER=snipeit
      - MYSQL_PASSWORD=secret
      - TZ=Asia/Bangkok
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  snipeit_data:
  mysql_data: